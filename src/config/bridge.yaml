# ros_gz_bridge 설정
# 명세의 토픽 이름(/front/cmd_vel 등)을 그대로 유지하고
# 가제보 내부 토픽(/model/.../cmd_vel)으로 매핑한다.
# → 나중에 실기체로 갈 때 제어 노드를 수정할 필요가 없음.

- ros_topic_name: "/front/cmd_vel"
  gz_topic_name: "/model/front_robot/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/rear/cmd_vel"
  gz_topic_name: "/model/rear_robot/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/front/odom"
  gz_topic_name: "/model/front_robot/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/rear/odom"
  gz_topic_name: "/model/rear_robot/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

- ros_topic_name: "/cctv/image"
  gz_topic_name: "/cctv/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

# ===== 초음파 (HC-SR04 대역 — LaserScan이지만 min 하나만 사용) =====
- ros_topic_name: "/front/us_left"
  gz_topic_name: "/front/us_left"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/front/us_right"
  gz_topic_name: "/front/us_right"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/rear/us_left"
  gz_topic_name: "/rear/us_left"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/rear/us_right"
  gz_topic_name: "/rear/us_right"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# ===== 그리퍼 조인트 명령 (0=접힘 180°, 1.5708=전개 90°) =====
- ros_topic_name: "/front/grip_left_cmd"
  gz_topic_name: "/front/grip_left_cmd"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/front/grip_right_cmd"
  gz_topic_name: "/front/grip_right_cmd"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/rear/grip_left_cmd"
  gz_topic_name: "/rear/grip_left_cmd"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/rear/grip_right_cmd"
